# analyses/registry.yaml — the single source of truth for the human navigation layer.
#
# One entry per SCIENTIFIC QUESTION. `analyses/_generate_analyses.py` renders a per-question card
# (analyses/<direction>/<id>.md) + the top-level map (analyses/README.md), and
# `summaries/_generate_summaries.py` renders per-direction narrative — BOTH from this file, cross-referenced
# with results/<cohort>/<direction>/reports (for cohort coverage + report/figure links). Edit facts HERE,
# never the generated .md. Verdicts trace to wiser/ANALYSIS_STATUS.md and change_log/.
#
# Fields per question: id, direction, question, verdict {confirmed|candidate|blocked|retracted},
#   claim (one sentence), evidence (numbers), report_glob (matches results/<cohort>/<direction>/reports/),
#   driver, blockers[], superseded, changelog, rerun, status_ref.

meta:
  status_tracker: wiser/ANALYSIS_STATUS.md
  verdict_marks: {confirmed: "✅", candidate: "⚠️", blocked: "⛔", retracted: "❌"}

questions:

  # ---------------- wiser_baseline ----------------
  - id: fixed_position_precision
    direction: wiser_baseline
    question: "What is WISER's static position precision (the jitter floor that bounds every spatial claim)?"
    verdict: confirmed
    claim: "Stationary jitter floor is ~7 in (18 cm) median, p95 ~15 in, at ~3.7-3.9 Hz — a precision floor, not accuracy."
    evidence: "Fixed-position test vs surveyed ground truth; RMS jitter median ~7 in."
    report_glob: "wiser_baseline_fixed_position_summary_*"
    driver: wiser/scripts/analyze_fixed_position_test.py
    blockers: ["precision only, not absolute accuracy", "inch frame is an unverified offset origin"]
    superseded: ""
    changelog: ""
    rerun: "python wiser/scripts/analyze_fixed_position_test.py --data D:\\Wiser\\data --trim-minutes 5"
    status_ref: "Fixed-position precision"

  - id: hourly_occupancy
    direction: wiser_baseline
    question: "Where do the animals spend time, hour by hour (live-DB-safe occupancy maps)?"
    verdict: confirmed
    claim: "Per-hour scatter/heatmaps computed from a strictly read-only view of the live WAL DB; the in-progress hour is never plotted."
    evidence: "Live-DB-safe hourly occupancy over the recording window."
    report_glob: ""
    driver: wiser/scripts/plot_hourly_occupancy.py
    blockers: ["inch frame unverified (no physical/directional claim)"]
    superseded: ""
    changelog: change_log/2026-06-28-hourly-occupancy-maps.md
    rerun: "python wiser/scripts/plot_hourly_occupancy.py"
    status_ref: "Hourly occupancy maps"

