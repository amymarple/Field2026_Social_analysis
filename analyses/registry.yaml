    evidence: "n=5, 11 nights; wet 122 vs dry 164 m confounded (wet nights are late-sequence + raise dropout); 6/30 DiD CI spans 0."
    report_glob: ""
    driver: wiser/scripts/analyze_nightly_progression.py
    blockers: ["rain and habituation confounded (wet nights late + low-N)", "weather drives dropout AND behavior", "n=5"]
