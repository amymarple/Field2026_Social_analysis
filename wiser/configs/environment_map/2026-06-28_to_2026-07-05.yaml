# environment_map/2026-06-28_to_2026-07-05.yaml
# Versioned physical-layout map for the WISER agent-policy identifiability study.
# This is the PRIMARY static-opportunity representation (NOT pooled animal occupancy).
# It is a thin layer over configs/wiser_rois.json (ROI geometry, placed directly in the
# WISER inch frame, confirmed per-ROI) + data_manifests/2026-06-29-wiser-pilot.yaml
# (time_varying_structures). It adds: resource types, nominally-symmetric groups (for the
# matched-choice analysis), the intervention/regime calendar, known WISER dropout regions,
# and registration-uncertainty bounds.
#
# Frame: WISER native inches, offset origin, UNVERIFIED vs the physical field frame
# (wiser_to_field_transform.json is ABSENT). Only topology + coarse (jitter-bounded)
# distances are usable; fine metric-distance predictors are forbidden (see registration).

meta:
  units: inches
  frame: WISER native (offset origin, UNVERIFIED)
  roi_source: configs/wiser_rois.json
  structures_source: data_manifests/2026-06-29-wiser-pilot.yaml#time_varying_structures
  window: {first_night: "2026-06-28", last_night: "2026-07-05"}   # 8 analyzable nights
  tz_offset_hours: -4

# --- resource type of each named ROI (open-field = anything outside a named ROI) ---
resource_types:
  house_1: house      # sleep shelter (rect); food_1 sits INSIDE it (co-location artifact)
  house_2: house      # sleep shelter (rect); food_2 sits INSIDE it
  food_1: food
  food_2: food
  water_1: water      # north
  water_2: water      # south
  refuge_1: refuge
  refuge_2: refuge
  refuge_3: refuge
  refuge_4: refuge    # 'shelter 4' — burrow entrance 07-03..07-07 (below-plane UWB dropout)
  tunnel_1: tunnel    # present night 06-28 only

# --- nominally symmetric groups for the matched-choice analysis ---
# Designed symmetry != experienced equivalence: matched-choice asks whether an animal shows
# a STABLE CROSS-NIGHT preference within a group when geometry/accessibility/weather/
# availability are comparable.
symmetric_groups:
  houses: [house_1, house_2]
  foods: [food_1, food_2]
  waters: [water_1, water_2]           # water_1 north (~y 872), water_2 south (~y 577)
  refuges_all: [refuge_1, refuge_2, refuge_3, refuge_4]
  refuges_left: [refuge_1, refuge_3]   # x ~300
  refuges_right: [refuge_2, refuge_4]  # x ~725

# --- food/water availability: constant across the whole window unless logged otherwise ---
availability:
  default: always
  changes: []                          # none logged in-window

# --- intervention / regime calendar (local EDT). Nights are 21:00 -> next-day 05:00. ---
# A "night" is labeled by its start date. valid_until on a structure = last instant present.
structures:
  - name: tunnel_1
    present_from: "2026-06-28T00:00:00-04:00"
    present_until: "2026-06-29T07:00:00-04:00"   # physically removed
    nights_present: ["2026-06-28"]               # only night 06-28
    note: tunnel; rats clustered there overnight; removed 06-29 07:00 EDT.
  - name: refuge_4
    present_from: "2026-06-28T00:00:00-04:00"
    present_until: "2026-07-07T13:00:00-04:00"   # removed AFTER the analysis window
    nights_present: ["2026-06-28","2026-06-29","2026-06-30","2026-07-01",
                     "2026-07-02","2026-07-03","2026-07-04","2026-07-05"]
    note: >
      'shelter 4' refuge, present all 8 analysis nights, but used as a BURROW ENTRANCE
      07-03..07-07 (see dropout_regions); removed 07-07 13:00 (after the window).

# WISER blind / high-dropout regions: a tag here is BELOW the anchor plane -> UWB drops out.
# Occupancy under-counts; a gap here is 'unknown', NEVER coded as leaving.
dropout_regions:
  - roi: refuge_4
    from: "2026-07-03T01:00:00-04:00"
    until: "2026-07-07T13:00:00-04:00"
    nights_affected: ["2026-07-03","2026-07-04","2026-07-05"]
    cause: burrow (below-plane), weather-independent
    effect: refuge_4 occupancy under-counts; time-outside over-counts

# Per-night regime flags (covariates + strata; NOT causal). Sova (12409) removed 06-29 15:00
# -> cohort 6->5; excluded from analysis entirely via tag cutoff.
night_regime:
  "2026-06-28": {phase: release,        wet: false, fireworks: false, truncated: false, burrow: false, n_rats: 6}
  "2026-06-29": {phase: early,          wet: false, fireworks: false, truncated: false, burrow: false, n_rats: 5}
  "2026-06-30": {phase: early,          wet: true,  fireworks: false, truncated: false, burrow: false, n_rats: 5}
  "2026-07-01": {phase: mid,            wet: true,  fireworks: false, truncated: false, burrow: false, n_rats: 5}
  "2026-07-02": {phase: mid,            wet: false, fireworks: false, truncated: false, burrow: false, n_rats: 5}
  "2026-07-03": {phase: mid,            wet: false, fireworks: false, truncated: false, burrow: true,  n_rats: 5}
  "2026-07-04": {phase: late,           wet: true,  fireworks: true,  truncated: false, burrow: true,  n_rats: 5}
  "2026-07-05": {phase: late,           wet: false, fireworks: false, truncated: true,  burrow: true,  n_rats: 5}

# --- registration bounds (the audit forbids fine-distance predictors below this scale) ---
registration:
  physical_transform: absent            # wiser_to_field_transform.json does not exist
  status: UNVERIFIED
  roi_placement_confirmed: true         # ROIs placed directly in WISER inches
  jitter_floor_in: 7.0                  # documented stationary jitter (p50 ~ a few in, p95 ~15)
  # distance DIFFERENCES below this are not trusted (2x jitter floor); use type/topology instead
  min_resolvable_distance_in: 14.0
